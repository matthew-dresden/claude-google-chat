name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        shell: bash
        run: |
          set -euo pipefail
          make install

      - name: Lint
        shell: bash
        run: |
          set -euo pipefail
          make lint

      - name: Format check
        shell: bash
        run: |
          set -euo pipefail
          make format-check

      - name: Typecheck
        shell: bash
        run: |
          set -euo pipefail
          make typecheck

      - name: Verify version consistency
        shell: bash
        run: |
          set -euo pipefail
          uv run python - <<'PY'
          import re
          import sys
          import tomllib
          from pathlib import Path

          toml_version = tomllib.loads(Path("pyproject.toml").read_text())["project"]["version"]
          init_text = Path("src/claude_google_chat/__init__.py").read_text()
          match = re.search(r'__version__\s*=\s*["\'](.*?)["\']', init_text)
          if match is None:
              sys.exit("__version__ not found in src/claude_google_chat/__init__.py")
          init_version = match.group(1)
          if toml_version != init_version:
              sys.exit(
                  f"Version mismatch: pyproject.toml ({toml_version}) "
                  f"!= __init__.py ({init_version})"
              )
          print(f"Version consistency verified: {toml_version}")
          PY

      - name: Validate JSON manifests
        shell: bash
        run: |
          set -euo pipefail
          uv run python -c "import json, pathlib; [json.loads(pathlib.Path(p).read_text()) for p in ['.claude-plugin/plugin.json', '.claude-plugin/marketplace.json', 'hooks/hooks.json']]"

      - name: Test
        shell: bash
        run: |
          set -euo pipefail
          make test

      - name: Build
        shell: bash
        run: |
          set -euo pipefail
          make build
